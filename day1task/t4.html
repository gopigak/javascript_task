<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>

    let days =prompt("Enter Working Days");

if (days > 25) {
    document.write("Excellent");
} else if (days >= 20 && days <= 25) {
    document.write("Good");
} else {
    document.write("Need Improvement");
}


    </script>
</body>
